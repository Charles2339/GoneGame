name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools, Platform & NDK
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore "${{ github.workspace }}/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Godot 4.3 (headless)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot 4.3 Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" \
            -O export_templates.tpz
          unzip -q export_templates.tpz -d export_templates_tmp
          mv export_templates_tmp/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf export_templates_tmp export_templates.tpz

      - name: Configure Godot Android Editor Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << SETTINGS
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "${{ github.workspace }}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Create output directory
        run: mkdir -p build/android

      - name: Export APK (debug)
        run: |
          godot --headless --export-debug "Android" \
            "${{ github.workspace }}/build/android/GoneGame-debug.apk" 2>&1
          echo "--- Export complete ---"
          ls -lah build/android/ || echo "No files in build/android"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoneGame-debug-apk
          path: build/android/GoneGame-debug.apk
          if-no-files-found: warn
          retention-days: 30
