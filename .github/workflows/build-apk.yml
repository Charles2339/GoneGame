name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore "${{ github.workspace }}/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "KEYSTORE_PATH=${{ github.workspace }}/debug.keystore" >> $GITHUB_ENV

      - name: Patch keystore path in export_presets.cfg
        run: |
          sed -i \
            "s|keystore/debug=\"debug.keystore\"|keystore/debug=\"${{ github.workspace }}/debug.keystore\"|g" \
            export_presets.cfg
          grep "keystore/debug=" export_presets.cfg | head -1

      - name: Export via firebelley/godot-export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          relative_project_path: "./"
          archive_output: false
          export_debug: true
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: "${{ github.workspace }}/debug.keystore"
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: "androiddebugkey"
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: "android"

      - name: Locate and upload APK
        run: |
          echo "=== Searching for APK ==="
          find /home/runner -name "*.apk" 2>/dev/null || echo "No APK found in /home/runner"
          find "${{ github.workspace }}" -name "*.apk" 2>/dev/null || echo "No APK found in workspace"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoneGame-debug-apk
          path: |
            /home/runner/work/GoneGame-debug.apk
            ${{ github.workspace }}/build/android/*.apk
          if-no-files-found: warn
          retention-days: 30
