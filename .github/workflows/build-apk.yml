name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

      - name: Generate debug keystore at standard Android path
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -lah "$HOME/.android/debug.keystore"

      - name: Download Godot 4.3 (headless)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot 4.3 Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" \
            -O export_templates.tpz
          unzip -q export_templates.tpz -d export_templates_tmp
          mv export_templates_tmp/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf export_templates_tmp export_templates.tpz

      - name: Write Godot Android Editor Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'SETTINGS'
          [gd_resource type="EditorSettings" load_steps=1 format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/java_sdk_path = "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64"
          export/android/debug_keystore = "/root/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/shutdown_adb_on_exit = false
          SETTINGS
          # Fix the keystore and java paths dynamically
          sed -i "s|/root/.android/debug.keystore|$HOME/.android/debug.keystore|g" \
            ~/.config/godot/editor_settings-4.tres
          sed -i "s|/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64|$JAVA_HOME|g" \
            ~/.config/godot/editor_settings-4.tres
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' ~/.config/godot/editor_settings-4.tres
          echo "=== Final Editor Settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Patch absolute keystore in export_presets.cfg
        run: |
          sed -i \
            "s|keystore/debug=\"debug.keystore\"|keystore/debug=\"$HOME/.android/debug.keystore\"|g" \
            export_presets.cfg
          grep "keystore/debug=" export_presets.cfg | head -1

      - name: Create output directory
        run: mkdir -p build/android

      - name: Run Godot import (initialize project)
        run: |
          godot --headless --path "${{ github.workspace }}" --import 2>&1
          echo "Import exit code: $?"

      - name: Check what Godot wrote to config dir
        run: |
          echo "=== Config files after import ==="
          ls -la ~/.config/godot/ || echo "No config dir"
          echo "=== Settings content ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Export APK (headless)
        run: |
          godot --headless \
            --path "${{ github.workspace }}" \
            --export-debug "Android" \
            "${{ github.workspace }}/build/android/GoneGame-debug.apk" 2>&1
          echo "=== Build output ==="
          ls -lah build/android/ || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoneGame-debug-apk
          path: build/android/GoneGame-debug.apk
          if-no-files-found: warn
          retention-days: 30
