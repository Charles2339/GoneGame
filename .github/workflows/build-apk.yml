name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

      - name: Download Godot 4.3
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot 4.3 Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" \
            -O export_templates.tpz
          unzip -q export_templates.tpz -d export_templates_tmp
          mv export_templates_tmp/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf export_templates_tmp export_templates.tpz

      - name: Write fresh editor_settings-4.3.tres (BEFORE Godot runs)
        run: |
          mkdir -p ~/.config/godot
          # Write a proper Godot resource file with android settings
          # Using printf to avoid heredoc expansion issues
          printf '[gd_resource type="EditorSettings" load_steps=1 format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\nexport/android/shutdown_adb_on_exit = false\n' \
            "$ANDROID_SDK_ROOT" \
            "$JAVA_HOME" \
            > ~/.config/godot/editor_settings-4.3.tres
          echo "=== Written settings file ==="
          cat ~/.config/godot/editor_settings-4.3.tres

      - name: Create output directory
        run: mkdir -p build/android

      - name: Export APK (headless, no --import, verbose)
        run: |
          godot --headless \
            --path "${{ github.workspace }}" \
            --verbose \
            --export-debug "Android" \
            "${{ github.workspace }}/build/android/GoneGame-debug.apk" 2>&1
          echo "=== Build output ==="
          ls -lah build/android/ 2>/dev/null || echo "No APK found"

      - name: Show what Godot saved to settings after export
        if: always()
        run: |
          echo "=== Settings file after Godot ran ==="
          cat ~/.config/godot/editor_settings-4.3.tres 2>/dev/null | grep -A2 "android" || echo "No android settings found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoneGame-debug-apk
          path: build/android/GoneGame-debug.apk
          if-no-files-found: warn
          retention-days: 30
