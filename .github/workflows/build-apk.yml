name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Godot 4.3
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          echo "Godot: $(godot --version)"

      - name: Download Godot 4.3 Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" \
            -O export_templates.tpz
          unzip -q export_templates.tpz -d export_templates_tmp
          mv export_templates_tmp/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf export_templates_tmp export_templates.tpz
          echo "Android templates:"
          ls ~/.local/share/godot/export_templates/4.3.stable/ | grep android

      - name: Run Godot import (creates editor_settings-4.3.tres)
        run: |
          mkdir -p ~/.config/godot
          godot --headless --path "${{ github.workspace }}" --import 2>&1 || true
          echo "Settings files created:"
          ls ~/.config/godot/

      - name: Patch export_presets.cfg with absolute keystore path
        run: |
          sed -i \
            "s|keystore/debug=\"debug.keystore\"|keystore/debug=\"$HOME/.android/debug.keystore\"|g" \
            export_presets.cfg
          grep "keystore/debug=" export_presets.cfg | head -1

      - name: Inject Android SDK settings into editor_settings-4.3.tres
        run: |
          # Key insight: Godot 4.3 reads editor_settings-4.3.tres, not editor_settings-4.tres
          # We inject our Android paths into the [resource] section
          SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.3.tres"
          
          # Remove any existing android export settings
          sed -i '/^export\/android\//d' "$SETTINGS_FILE"
          
          # Append our Android settings before the end of the file
          cat >> "$SETTINGS_FILE" << ANDROID_SETTINGS
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/shutdown_adb_on_exit = false
          ANDROID_SETTINGS
          
          # Remove leading whitespace from heredoc lines
          sed -i 's/^[[:space:]]*//' "$SETTINGS_FILE"
          
          echo "=== Final android settings in editor_settings-4.3.tres ==="
          grep "android" "$SETTINGS_FILE"

      - name: Create output directory
        run: mkdir -p build/android

      - name: Export APK (headless)
        run: |
          godot --headless \
            --path "${{ github.workspace }}" \
            --export-debug "Android" \
            "${{ github.workspace }}/build/android/GoneGame-debug.apk" 2>&1
          echo "=== Build output ==="
          ls -lah build/android/ || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoneGame-debug-apk
          path: build/android/GoneGame-debug.apk
          if-no-files-found: warn
          retention-days: 30
